<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zurban Propiedades</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #1A2E4A; --navy-dark: #111f33; --navy-mid: #243d5c;
    --gold: #C9A84C; --gold-light: #dfc07a; --cream: #faf8f3;
    --white: #ffffff; --text: #1A2E4A; --text-muted: #5a6a7e;
    --border: rgba(26,46,74,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Jost', sans-serif; font-weight: 300; color: var(--text); background: var(--cream); }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(26,46,74,0.96); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 72px;
    border-bottom: 1px solid rgba(201,168,76,0.25);
  }
  .nav-logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
  .nav-logo-circle { width: 44px; height: 44px; border-radius: 50%; border: 2.5px solid var(--gold); display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .nav-logo-circle span { font-family: 'Cormorant Garamond', serif; font-size: 14px; font-weight: 500; color: var(--gold); }
  .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; color: var(--white); letter-spacing: 0.13em; }
  .nav-brand small { display: block; font-family: 'Jost', sans-serif; font-size: 9px; font-weight: 300; color: var(--gold-light); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 1px; }
  .nav-back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; transition: color 0.2s; }
  .nav-back:hover { color: var(--gold-light); }

  /* MAIN */
  .page { padding-top: 72px; }

  /* GALLERY */
  .gallery { background: var(--navy-dark); position: relative; }
  .gallery-main { width: 100%; height: 70vh; min-height: 400px; object-fit: cover; display: block; cursor: pointer; }
  .gallery-main-placeholder { width: 100%; height: 70vh; min-height: 400px; background: var(--navy-mid); display: flex; align-items: center; justify-content: center; }
  .gallery-thumbs { display: flex; gap: 4px; padding: 4px; background: var(--navy-dark); overflow-x: auto; }
  .gallery-thumb { width: 100px; height: 70px; object-fit: cover; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; flex-shrink: 0; }
  .gallery-thumb.active, .gallery-thumb:hover { opacity: 1; }
  .gallery-count { position: absolute; bottom: 84px; right: 24px; background: rgba(0,0,0,0.6); color: white; padding: 6px 14px; border-radius: 100px; font-size: 12px; letter-spacing: 0.08em; }

  /* CONTENT */
  .prop-content { display: grid; grid-template-columns: 1fr 360px; gap: 48px; max-width: 1200px; margin: 0 auto; padding: 48px 5%; }

  /* LEFT */
  .prop-left { }
  .prop-badge { display: inline-block; padding: 4px 14px; border-radius: 2px; font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px; }
  .badge-venta { background: rgba(201,168,76,0.15); color: #8a6e1a; }
  .badge-alquiler { background: rgba(26,46,74,0.1); color: var(--navy); }
  .prop-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 42px); font-weight: 400; line-height: 1.15; color: var(--navy); margin-bottom: 12px; }
  .prop-location { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
  .prop-price-big { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 400; color: var(--navy); margin-bottom: 32px; }
  .prop-features-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; padding: 28px; background: var(--white); border-radius: 6px; border: 1px solid var(--border); }
  .prop-feature-item { text-align: center; }
  .prop-feature-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--navy); line-height: 1; }
  .prop-feature-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }
  .prop-section-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--navy); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .prop-description { font-size: 15px; font-weight: 300; line-height: 1.9; color: var(--text-muted); margin-bottom: 40px; white-space: pre-line; }
  .prop-details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .prop-detail-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .prop-detail-label { font-size: 13px; color: var(--text-muted); }
  .prop-detail-value { font-size: 13px; font-weight: 400; color: var(--navy); }

  /* RIGHT - CONTACT CARD */
  .contact-card { background: var(--white); border-radius: 6px; border: 1px solid var(--border); padding: 32px; position: sticky; top: 96px; }
  .contact-card-price { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; color: var(--navy); margin-bottom: 4px; }
  .contact-card-type { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 24px; }
  .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: #25D366; color: white; border: none; cursor: pointer; padding: 14px; border-radius: 4px; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; transition: background 0.2s; margin-bottom: 12px; }
  .btn-whatsapp:hover { background: #1da851; }
  .btn-contact { display: block; width: 100%; background: var(--navy); color: var(--gold); border: none; cursor: pointer; padding: 14px; border-radius: 4px; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; transition: background 0.2s; text-align: center; margin-bottom: 24px; }
  .btn-contact:hover { background: var(--navy-mid); }
  .contact-agent { display: flex; align-items: center; gap: 14px; padding-top: 20px; border-top: 1px solid var(--border); }
  .agent-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--navy-mid); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .agent-avatar span { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--gold); }
  .agent-name { font-size: 14px; font-weight: 400; color: var(--navy); }
  .agent-title { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }
  .agent-mat { font-size: 11px; color: var(--text-muted); }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
  .lightbox-close { position: absolute; top: 24px; right: 24px; background: none; border: none; color: white; font-size: 32px; cursor: pointer; }
  .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: white; font-size: 24px; cursor: pointer; padding: 16px 20px; border-radius: 4px; transition: background 0.2s; }
  .lightbox-prev:hover, .lightbox-next:hover { background: rgba(255,255,255,0.2); }
  .lightbox-prev { left: 24px; }
  .lightbox-next { right: 24px; }

  .loading-state { min-height: 60vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; color: var(--text-muted); }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .prop-content { grid-template-columns: 1fr; }
    .contact-card { position: static; }
    .prop-features-grid { grid-template-columns: repeat(2, 1fr); }
    .prop-details-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-circle"><span>Z</span></div>
    <div class="nav-brand">Zurban<small>Propiedades</small></div>
  </a>
  <a href="/" class="nav-back">← Volver a propiedades</a>
</nav>

<div class="page">
  <div id="loadingState" class="loading-state">
    <div class="spinner"></div>
    <p>Cargando propiedad...</p>
  </div>
  <div id="propContent" style="display:none">
    <!-- GALLERY -->
    <div class="gallery" id="gallery">
      <img id="mainPhoto" class="gallery-main" src="" alt="foto principal" onclick="openLightbox(0)">
      <div class="gallery-count" id="galleryCount"></div>
      <div class="gallery-thumbs" id="thumbsContainer"></div>
    </div>

    <!-- CONTENT -->
    <div class="prop-content">
      <div class="prop-left">
        <span class="prop-badge" id="propBadge"></span>
        <h1 class="prop-title" id="propTitle"></h1>
        <div class="prop-location">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="propDireccion"></span>
        </div>
        <div class="prop-price-big" id="propPrecio"></div>

        <div class="prop-features-grid" id="featuresGrid"></div>

        <h2 class="prop-section-title">Descripción</h2>
        <div class="prop-description" id="propDescripcion"></div>

        <h2 class="prop-section-title">Características</h2>
        <div class="prop-details-grid" id="detailsGrid"></div>
      </div>

      <div class="prop-right">
        <div class="contact-card">
          <div class="contact-card-price" id="cardPrecio"></div>
          <div class="contact-card-type" id="cardTipo"></div>
          <a id="btnWhatsApp" href="#" target="_blank" class="btn-whatsapp">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Consultar por WhatsApp
          </a>
          <a href="/#contacto" class="btn-contact">Enviar consulta</a>
          <div class="contact-agent">
            <div class="agent-avatar"><span>L</span></div>
            <div>
              <div class="agent-name">Leticia Lescano Zurro</div>
              <div class="agent-title">Martillera y Corredora Inmobiliaria</div>
              <div class="agent-mat">Mat. Prof. 042436</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-prev" onclick="lightboxPrev()">‹</button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-next" onclick="lightboxNext()">›</button>
</div>

<script>
const SUPABASE_URL = 'https://zckcdetutyehebezsmlh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VnAm_RHVhMbsg5413toJxQ_aKBhKZqB';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let fotos = [];
let lightboxIndex = 0;

function formatPrecio(precio, moneda, operacion) {
  if (!precio) return 'Consultar';
  const num = Number(precio).toLocaleString('es-AR');
  return (moneda === 'USD' ? 'USD ' : '$ ') + num + (operacion === 'alquiler' ? '/mes' : '');
}

async function loadPropiedad() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { window.location = '/'; return; }

  const { data: p, error } = await sb.from('propiedades').select('*').eq('id', id).single();
  if (error || !p) { window.location = '/'; return; }

  document.title = (p.titulo || 'Propiedad') + ' – Zurban Propiedades';
  fotos = p.fotos ? JSON.parse(p.fotos) : [];

  // Gallery
  if (fotos.length > 0) {
    document.getElementById('mainPhoto').src = fotos[0];
    document.getElementById('galleryCount').textContent = `1 / ${fotos.length}`;
    const thumbs = document.getElementById('thumbsContainer');
    fotos.forEach((url, i) => {
      const img = document.createElement('img');
      img.src = url; img.className = 'gallery-thumb' + (i === 0 ? ' active' : '');
      img.onclick = () => setMainPhoto(i);
      thumbs.appendChild(img);
    });
  } else {
    document.getElementById('mainPhoto').style.display = 'none';
    document.getElementById('gallery').innerHTML = '<div class="gallery-main-placeholder"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></div>';
  }

  // Badge
  const badge = document.getElementById('propBadge');
  badge.textContent = p.operacion === 'alquiler' ? 'Alquiler' : 'Venta';
  badge.className = 'prop-badge badge-' + p.operacion;

  // Title & location
  document.getElementById('propTitle').textContent = p.titulo || '';
  document.getElementById('propDireccion').textContent = p.direccion || '';

  // Price
  const precio = formatPrecio(p.precio, p.moneda, p.operacion);
  document.getElementById('propPrecio').textContent = precio;
  document.getElementById('cardPrecio').textContent = precio;
  document.getElementById('cardTipo').textContent = (p.tipo || '') + ' en ' + (p.operacion || '');

  // Features
  const features = [];
  if (p.dormitorios) features.push({ val: p.dormitorios, label: 'Dormitorios' });
  if (p.banos) features.push({ val: p.banos, label: 'Baños' });
  if (p.sup_cubierta) features.push({ val: p.sup_cubierta + ' m²', label: 'Sup. cubierta' });
  if (p.sup_total) features.push({ val: p.sup_total + ' m²', label: 'Sup. total' });
  document.getElementById('featuresGrid').innerHTML = features.map(f =>
    `<div class="prop-feature-item"><div class="prop-feature-value">${f.val}</div><div class="prop-feature-label">${f.label}</div></div>`
  ).join('');

  // Description
  document.getElementById('propDescripcion').textContent = p.descripcion || 'Sin descripción disponible.';

  // Details
  const details = [
    { label: 'Tipo', value: p.tipo },
    { label: 'Operación', value: p.operacion === 'venta' ? 'Venta' : 'Alquiler' },
    { label: 'Cochera', value: p.cochera === 'si' ? 'Sí' : 'No' },
    { label: 'Patio / Jardín', value: p.patio === 'no' ? 'No' : p.patio === 'patio' ? 'Patio (cemento)' : p.patio === 'jardin' ? 'Jardín (césped)' : p.patio === 'ambos' ? 'Patio y jardín' : '–' },
    { label: 'Sup. cubierta', value: p.sup_cubierta ? p.sup_cubierta + ' m²' : '–' },
    { label: 'Sup. total', value: p.sup_total ? p.sup_total + ' m²' : '–' },
  ].filter(d => d.value);
  document.getElementById('detailsGrid').innerHTML = details.map(d =>
    `<div class="prop-detail-item"><span class="prop-detail-label">${d.label}</span><span class="prop-detail-value">${d.value}</span></div>`
  ).join('');

  // WhatsApp
  const msg = encodeURIComponent(`Hola Leticia! Me interesa la propiedad: ${p.titulo} - ${p.direccion}`);
  document.getElementById('btnWhatsApp').href = `https://wa.me/5493512004745?text=${msg}`;

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('propContent').style.display = 'block';
}

function setMainPhoto(index) {
  document.getElementById('mainPhoto').src = fotos[index];
  document.getElementById('galleryCount').textContent = `${index + 1} / ${fotos.length}`;
  document.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === index));
  lightboxIndex = index;
}

function openLightbox(index) {
  lightboxIndex = index;
  document.getElementById('lightboxImg').src = fotos[lightboxIndex];
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function lightboxPrev() { lightboxIndex = (lightboxIndex - 1 + fotos.length) % fotos.length; document.getElementById('lightboxImg').src = fotos[lightboxIndex]; }
function lightboxNext() { lightboxIndex = (lightboxIndex + 1) % fotos.length; document.getElementById('lightboxImg').src = fotos[lightboxIndex]; }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lightboxPrev();
  if (e.key === 'ArrowRight') lightboxNext();
});

loadPropiedad();
</script>
</body>
</html>
